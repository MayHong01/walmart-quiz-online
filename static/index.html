<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Know Your Walmart!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      walmart: { blue: '#0053e2', blueHover: '#004ac7', spark: '#ffc220' }
    }}}}
  </script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    .fade-in { animation: fadeIn 0.4s ease-out; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <header class="bg-walmart-blue text-white py-4 shadow-lg">
    <div class="max-w-3xl mx-auto px-4 flex items-center gap-3">
      <span class="text-walmart-spark text-3xl">✦</span>
      <h1 class="text-2xl font-bold">Know Your Walmart!</h1>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-10 flex-1">
    <div class="bg-white rounded-2xl shadow-lg p-10 border border-gray-100 text-center fade-in">
      <div class="text-7xl mb-6">🏆</div>
      <h2 class="text-3xl font-bold text-gray-800 mb-3">Know Your Walmart!</h2>
      <p class="text-gray-500 mb-8 text-lg">15 questions • Speed-based scoring • Live rankings!</p>

      <div class="max-w-sm mx-auto space-y-6">
        <!-- Create Room -->
        <div>
          <button onclick="createRoom()"
            class="w-full bg-walmart-blue hover:bg-walmart-blueHover text-white font-bold py-4 px-8 rounded-xl text-lg shadow-md transition-all focus:outline-none focus:ring-4 focus:ring-blue-300">
            🎤 Host a Quiz
          </button>
          <p class="text-gray-400 text-sm mt-2">Create a room &amp; share the code with your team</p>
        </div>

        <div class="flex items-center gap-4"><hr class="flex-1"><span class="text-gray-400 text-sm font-medium">OR</span><hr class="flex-1"></div>

        <!-- Join Room -->
        <div>
          <label for="room-code" class="block text-left text-sm font-semibold text-gray-700 mb-2">Join a Room</label>
          <div class="flex gap-2">
            <input id="room-code" type="text" placeholder="Enter room code" maxlength="5"
              class="flex-1 border-2 border-gray-200 rounded-xl px-4 py-3 text-center text-lg font-mono tracking-widest uppercase focus:border-walmart-blue focus:outline-none focus:ring-4 focus:ring-blue-100"
              oninput="this.value=this.value.toUpperCase()" />
            <button onclick="joinRoom()"
              class="bg-walmart-spark hover:bg-yellow-500 text-gray-900 font-bold px-6 py-3 rounded-xl shadow-md transition-all focus:outline-none focus:ring-4 focus:ring-yellow-300">
              Join
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="share-info" class="hidden mt-6 bg-white rounded-xl shadow p-4 border border-gray-100 text-center fade-in">
      <p class="text-gray-500 text-sm">🌐 Share this link with teammates:</p>
      <p id="share-url" class="text-walmart-blue font-mono font-bold text-lg mt-1"></p>
    </div>
  </main>

  <footer class="text-center text-gray-400 text-xs py-6">Made with 🐶 by Cute Puppy &bull; Walmart 2026</footer>

  <script>
    async function createRoom() {
      // Generate room code client-side, then redirect to host page
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
      window.location.href = `/host/${code}`;
    }

    function joinRoom() {
      const code = document.getElementById('room-code').value.trim();
      if (code.length < 4) { alert('Please enter a valid room code'); return; }
      window.location.href = `/play/${code}`;
    }

    document.getElementById('room-code').addEventListener('keydown', e => {
      if (e.key === 'Enter') joinRoom();
    });

    // Show the share URL
    fetch('/api/ip').then(r => r.json()).then(data => {
      const url = `http://${data.ip}:${location.port || 8899}`;
      document.getElementById('share-url').textContent = url;
      document.getElementById('share-info').classList.remove('hidden');
    }).catch(() => {});
  </script>
</body>
</html>
